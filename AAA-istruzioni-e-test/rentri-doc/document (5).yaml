      - name: codice_blocco
        in: path
        description: Codice del blocco per il quale si richiede l'elenco delle vidimazioni FIR.
        required: true
        schema:
          type: string
      - name: progressivo_iniziale
        in: query
        description: Progressivo iniziale a partire dal quale restituire l'elenco delle vidimazioni FIR.
        schema:
          type: integer
          format: int32
      - name: progressivo_finale
        in: query
        description: Progressivo finale fino al quale restituire l'elenco dei numeri FIR.
        schema:
          type: integer
          format: int32
      - name: Paging-Page
        in: header
        description: Valore per l'header Paging-Page.
        schema:
          maximum: 2147483647
          minimum: 1
          type: integer
          format: int32
          default: 1
      - name: Paging-PageSize
        in: header
        description: Valore per l'header Paging-PageSize.
        schema:
          maximum: 1000
          minimum: 1
          type: integer
          format: int32
          default: 100
      responses:
        200:
          description: OK
          headers:
            Paging-PageCount:
              description: Numero totale di pagine.
              schema:
                type: integer
                description: Numero totale di pagine.
                format: $int32
            Paging-Page:
              description: Numero di pagina.
              schema:
                type: integer
                description: Numero di pagina.
                format: $int32
            Paging-PageSize:
              description: Dimensione della pagina.
              schema:
                type: integer
                description: Dimensione della pagina.
                format: $int32
            Paging-TotalRecordCount:
              description: Numero totale di record.
              schema:
                type: integer
                description: Numero totale di record.
                format: $int32
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EfirModel'
        400:
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        403:
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        404:
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        500:
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        429:
          description: Troppe richieste. Questa risposta viene restituita quando vengono rilevate più di 100 richieste in 5 secondi.
          headers:
            Retry-After:
              description: Indica quanto tempo il fruitore deve attendere prima di effettuare una nuova richiesta.
        423:
          description: >-
            Sono state eseguite troppe richieste non valide. 
            						Questa risposta viene restituita quando viene rilevato un numero eccessivo di richieste concorrenti, autenticate ma non valide. 
            						In questo caso, le eventuali richieste valide continueranno ad essere accettate, mentre solo le richieste non valide verranno bloccate applicando un meccanismo di "ban" a livello di chiamante (Issuer). 
            						Il servizio di assistenza per l'interoperabilità RENTRI potrà essere contattato dal fruitore del servizio per i chiarimenti relativi alle richieste non valide, al fine di apportare le correzioni necessarie ai client.
    post:
      tags:
      - Vidimazione
      summary: "\U0001F501[ASYNC] Vidimazione nuovo FIR"
      description: >-
        Acquisisce la richiesta di vidimazione di un nuovo FIR per il blocco specificato.


        Il servizio di vidimazione è soggetto a limiti giornalieri in funzione del tipo di blocco per cui si richiede la vidimazione.


        Nell'ambiente DEMO le richieste giornaliere effettuabili per operatore sono 500 sull'insieme dei blocchi non associati a unità locali e 500 sull'insieme dei blocchi associati ad una stessa unità locale.


        Nell'ambiente PRODUZIONE le richieste giornaliere effettuabili per operatore sono 1000 sull'insieme dei blocchi non associati a unità locali e 1000 sull'insieme dei blocchi associati ad una stessa unità locale.

        <br/>Se viene specificato un URL nell'header <i>X-ReplyTo</i>, al termine dell'elaborazione dei dati, il fruitore riceverà una notifica con l'esito dell'elaborazione all'URL specificato.
      parameters:
      - name: codice_blocco
        in: path
        description: Codice blocco dal nuovo FIR da vidimare.
        required: true
        schema:
          type: string
      - name: X-ReplyTo
        in: header
        description: URL di callback alla quale verrà inviata la notifica di fine elaborazione.
        schema:
          type: string
          format: uri
      responses:
        202:
          description: Richiesta accettata.
          headers:
            Location:
              description: URL per verificare lo stato dell'elaborazione. Restituito solo se non viene specificata una URL di callback nell'header <i>X-ReplyTo</i>.
              schema:
                type: string
                description: URL per verificare lo stato dell'elaborazione.
                format: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransazioneModel'
        400:
          description: Dettaglio degli errori di validazione in caso di modello dati non valido.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        403:
          description: Operazione non consentita.
        404:
          description: Codice blocco trovato.
        500:
          description: Errore non gestito (contattare l'assistenza).
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        429:
          description: Troppe richieste. Questa risposta viene restituita quando vengono rilevate più di 100 richieste in 5 secondi.
          headers:
            Retry-After:
              description: Indica quanto tempo il fruitore deve attendere prima di effettuare una nuova richiesta.
        423:
          description: >-
            Sono state eseguite troppe richieste non valide. 
            						Questa risposta viene restituita quando viene rilevato un numero eccessivo di richieste concorrenti, autenticate ma non valide. 
            						In questo caso, le eventuali richieste valide continueranno ad essere accettate, mentre solo le richieste non valide verranno bloccate applicando un meccanismo di "ban" a livello di chiamante (Issuer). 
            						Il servizio di assistenza per l'interoperabilità RENTRI potrà essere contattato dal fruitore del servizio per i chiarimenti relativi alle richieste non valide, al fine di apportare le correzioni necessarie ai client.
      callbacks:
        Vidimazione nuovo FIR:
          https://example.com:
            post:
              summary: URL di callback
              requestBody:
                content:
                  application/json:
                    schema:
                      $ref: '#/components/schemas/EsitoVidimazioneModel'
              responses:
                200:
                  description: Il fruitore restituisce questo Status Code in caso di avvenuta ricezione.
                400:
                  description: Il fruitore restituisce questo Status Code in caso di formato non corretto della richiesta.
                500:
                  description: Il fruitore restituisce questo Status Code in caso di errori non dipendenti dalla richiesta.
