openapi: 3.0.1
info:
  title: vidimazione-formulari
  description: Servizio vidimazione formulari RENTRI
  termsOfService: https://www.rentri.gov.it
  contact:
    email: techref@rentri.it
  version: 1.0.20250606-706
  x-summary: Servizio vidimazione formulari RENTRI
  x-api-id: rentrigov.vivifir
servers:
- url: https://demoapi.rentri.gov.it/vidimazione-formulari/v1.0
  description: Demo
paths:
  /:
    get:
      tags:
      - Vidimazione
      summary: Elenco blocchi
      description: >+
        Restituisce l'elenco dei blocchi del soggetto specificato.


        Se si indica anche il numero iscrizione unità locale, vengono restituiti solo i blocchi dell'unità locale specificata.


        La creazione dei blocchi è possibile solo nell'area web Operatori, tramite la funzionalità Interoperabilità/Gestione blocchi virtuali dei FIR.


        Nell'ambiente DEMO è possibile creare al massimo 100 blocchi per operatore.


        Nell'ambiente PRODUZIONE è possibile creare al massimo 500 blocchi per operatore.
      parameters:
      - name: identificativo
        in: query
        description: Codice fiscale del soggetto per il quale recuperare i blocchi
        required: true
        schema:
          type: string
      - name: num_iscr_sito
        in: query
        description: Numero iscrizione unità locale per il quale recuperare i blocchi
        schema:
          type: string
      - name: codice_blocco
        in: query
        description: Codice del singolo blocco da recuperare
        schema:
          type: string
      - name: anche_disattivi
        in: query
        description: Parametro booleano per recuperare anche i blocchi disattivati
        schema:
          type: boolean
      - name: Paging-Page
        in: header
        description: Valore per l'header Paging-Page.
        schema:
          maximum: 2147483647
          minimum: 1
          type: integer
          format: int32
          default: 1
      - name: Paging-PageSize
        in: header
        description: Valore per l'header Paging-PageSize.
        schema:
          maximum: 1000
          minimum: 1
          type: integer
          format: int32
          default: 100
      responses:
        200:
          description: OK
          headers:
            Paging-PageCount:
              description: Numero totale di pagine.
              schema:
                type: integer
                description: Numero totale di pagine.
                format: $int32
            Paging-Page:
              description: Numero di pagina.
              schema:
                type: integer
                description: Numero di pagina.
                format: $int32
            Paging-PageSize:
              description: Dimensione della pagina.
              schema:
                type: integer
                description: Dimensione della pagina.
                format: $int32
            Paging-TotalRecordCount:
              description: Numero totale di record.
              schema:
                type: integer
                description: Numero totale di record.
                format: $int32
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BloccoModel'
        400:
          description: Bad Request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        403:
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        500:
          description: Internal Server Error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        429:
          description: Troppe richieste. Questa risposta viene restituita quando vengono rilevate più di 100 richieste in 5 secondi.
          headers:
            Retry-After:
              description: Indica quanto tempo il fruitore deve attendere prima di effettuare una nuova richiesta.
        423:
          description: >-
            Sono state eseguite troppe richieste non valide. 
            						Questa risposta viene restituita quando viene rilevato un numero eccessivo di richieste concorrenti, autenticate ma non valide. 
            						In questo caso, le eventuali richieste valide continueranno ad essere accettate, mentre solo le richieste non valide verranno bloccate applicando un meccanismo di "ban" a livello di chiamante (Issuer). 
            						Il servizio di assistenza per l'interoperabilità RENTRI potrà essere contattato dal fruitore del servizio per i chiarimenti relativi alle richieste non valide, al fine di apportare le correzioni necessarie ai client.
  /{codice_blocco}:
    get:
