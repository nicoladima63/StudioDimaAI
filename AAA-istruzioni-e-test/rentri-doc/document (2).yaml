components:
  schemas:
    ByteLookupModel:
      type: object
      properties:
        id:
          type: integer
          format: int32
        code:
          type: string
          nullable: true
        name:
          type: string
          nullable: true
        properties:
          type: object
          additionalProperties:
            nullable: true
          nullable: true
      additionalProperties: false
    Int16LookupModel:
      type: object
      properties:
        id:
          type: integer
          format: int32
        code:
          type: string
          nullable: true
        name:
          type: string
          nullable: true
        properties:
          type: object
          additionalProperties:
            nullable: true
          nullable: true
      additionalProperties: false
    Int32LookupModel:
      type: object
      properties:
        id:
          type: integer
          format: int32
        code:
          type: string
          nullable: true
        name:
          type: string
          nullable: true
        properties:
          type: object
          additionalProperties:
            nullable: true
          nullable: true
      additionalProperties: false
    ProblemDetails:
      type: object
      properties:
        type:
          type: string
          nullable: true
        title:
          type: string
          nullable: true
        status:
          type: integer
          format: int32
          nullable: true
        detail:
          type: string
          nullable: true
        instance:
          type: string
          nullable: true
      additionalProperties: {}
    StatusResponse:
      type: object
      properties:
        status:
          allOf:
          - $ref: '#/components/schemas/StatusResponseEnum'
        warnings:
          type: array
          items:
            type: string
          nullable: true
      additionalProperties: false
    StatusResponseEnum:
      enum:
      - Ok
      - Warning
      type: string
    StringLookupModel:
      type: object
      properties:
        id:
          type: string
          nullable: true
        code:
          type: string
          nullable: true
        name:
          type: string
          nullable: true
        properties:
          type: object
          additionalProperties:
            nullable: true
          nullable: true
      additionalProperties: false
  securitySchemes:
    Bearer:
      type: http
      description: Bearer JWT
      scheme: bearer
      bearerFormat: JWT
security:
- Bearer: []
tags:
- name: Territoriali
- name: Rifiuto
- name: FIR/Registro
