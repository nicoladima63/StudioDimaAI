openapi: 3.0.1
info:
  title: codifiche
  description: Servizio codifiche RENTRI
  termsOfService: https://www.rentri.gov.it
  contact:
    email: techref@rentri.it
  version: 1.0.20250603-691
  x-summary: Servizio codifiche RENTRI
  x-api-id: rentrigov.base
servers:
- url: https://demoapi.rentri.gov.it/codifiche/v1.0
  description: Demo
paths:
  /lookup/adr-classi:
    get:
      tags:
      - Rifiuto
      summary: Classi ADR
      description: Ottiene la lista delle classe ADR.
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ByteLookupModel'
        429:
          description: Troppe richieste. Questa risposta viene restituita quando vengono rilevate più di 100 richieste in 5 secondi.
          headers:
            Retry-After:
              description: Indica quanto tempo il fruitore deve attendere prima di effettuare una nuova richiesta.
        423:
          description: >-
            Sono state eseguite troppe richieste non valide. 
            						Questa risposta viene restituita quando viene rilevato un numero eccessivo di richieste concorrenti, autenticate ma non valide. 
            						In questo caso, le eventuali richieste valide continueranno ad essere accettate, mentre solo le richieste non valide verranno bloccate applicando un meccanismo di "ban" a livello di chiamante (Issuer). 
            						Il servizio di assistenza per l'interoperabilità RENTRI potrà essere contattato dal fruitore del servizio per i chiarimenti relativi alle richieste non valide, al fine di apportare le correzioni necessarie ai client.
