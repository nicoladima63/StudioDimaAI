<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8">
  <title>Reminder Test</title>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <style>
    body {
      font-family: monospace;
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
      background: #1a1a2e;
      color: #eee;
    }

    h2 {
      color: #00d4ff;
    }

    label {
      display: block;
      margin: 10px 0 4px;
      color: #aaa;
      font-size: 13px;
    }

    input,
    textarea {
      width: 100%;
      padding: 8px;
      background: #16213e;
      border: 1px solid #444;
      color: #eee;
      border-radius: 4px;
      box-sizing: border-box;
      font-family: monospace;
    }

    .row {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
    }

    .btn-dry {
      background: #0f3460;
      color: #00d4ff;
      border: 1px solid #00d4ff;
    }

    .btn-send {
      background: #c0392b;
      color: #fff;
    }

    .btn-dry:hover {
      background: #1a4a7a;
    }

    .btn-send:hover {
      background: #e74c3c;
    }

    #output {
      margin-top: 24px;
      background: #0d0d1a;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 16px;
      white-space: pre-wrap;
      font-size: 13px;
      min-height: 80px;
    }

    .ok {
      color: #2ecc71;
    }

    .err {
      color: #e74c3c;
    }

    .info {
      color: #f39c12;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 16px;
      font-size: 13px;
    }

    th {
      background: #0f3460;
      color: #00d4ff;
      padding: 8px;
      text-align: left;
    }

    td {
      padding: 7px 8px;
      border-bottom: 1px solid #222;
    }

    tr:hover td {
      background: #1a1a3e;
    }

    .pid {
      color: #f39c12;
      cursor: pointer;
      text-decoration: underline;
    }

    .pid:hover {
      color: #ffcc00;
    }

    small {
      color: #666;
      font-size: 11px;
    }
  </style>
</head>

<body>

  <h2>Reminder Test Tool</h2>

  <label>Server URL</label>
  <input id="server" value="" placeholder="lascia vuoto se apri dal server (http://serverdima:8000/reminder_test.html)" />

  <label>JWT Token</label>
  <textarea id="token" rows="3" placeholder="Incolla il token JWT"></textarea>

  <label>Patient ID (opzionale — per inviare solo a uno)</label>
  <input id="patient_id" placeholder="es. 00042 — clicca su un ID nella tabella per compilarlo" />

  <div class="row">
    <button class="btn-dry" onclick="run(true)">DRY RUN — lista appuntamenti domani</button>
    <button class="btn-send" onclick="run(false)">INVIA reminder (solo al patient_id sopra se compilato)</button>
  </div>

  <div id="output">Output apparirà qui...</div>

  <script>
    async function run(dryRun) {
      const server = document.getElementById('server').value.trim();
      const token = document.getElementById('token').value.trim();
      const pid = document.getElementById('patient_id').value.trim();
      const out = document.getElementById('output');

      if (!token) { out.innerHTML = '<span class="err">Token mancante.</span>'; return; }

      const body = { dry_run: dryRun };
      if (pid) body.patient_id = pid;

      out.innerHTML = '<span class="info">Chiamata in corso...</span>';

      try {
        const base = server || window.location.origin;
      const res = await axios.post(`${base}/api/v2/reminders/trigger-24h`, body, {
          headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' }
        });

        const data = res.data;
        const d = data.data || data;

        let html = `<span class="ok">✓ ${dryRun ? 'DRY RUN' : 'INVIO'} completato</span>\n\n`;
        html += `WA inviati: ${d.sent_wa ?? 0}   SMS inviati: ${d.sent_sms ?? 0}   Errori: ${(d.errors || []).length}\n`;

        if (d.appointments && d.appointments.length > 0) {
          html += `\nAppuntamenti trovati (${d.appointments.length}):\n`;
          html += '</pre><table><tr><th>Patient ID</th><th>Nome</th><th>Data</th><th>Ora</th><th>Canale stimato</th></tr>';
          d.appointments.forEach(a => {
            html += `<tr>
          <td class="pid" onclick="document.getElementById('patient_id').value='${a.patient_id}'" title="Clicca per selezionare">${a.patient_id}</td>
          <td>${a.patient_name || '-'}</td>
          <td>${a.appointment_date || '-'}</td>
          <td>${a.appointment_time || '-'}</td>
          <td>${a.channel || '-'}</td>
        </tr>`;
          });
          html += '</table><pre>';
        } else if (dryRun) {
          html += '\nNessun appuntamento trovato per domani.';
        }

        if ((d.errors || []).length > 0) {
          html += `\n<span class="err">Errori:\n${JSON.stringify(d.errors, null, 2)}</span>`;
        }
        if ((d.skipped_fisso || []).length > 0) {
          html += `\n<span class="info">Solo fisso (nessun SMS/WA):\n${d.skipped_fisso.map(p => p.name).join(', ')}</span>`;
        }

        out.innerHTML = `<pre>${html}</pre>`;
      } catch (e) {
        const msg = e.response ? JSON.stringify(e.response.data, null, 2) : e.message;
        out.innerHTML = `<pre><span class="err">Errore:\n${msg}</span></pre>`;
      }
    }
  </script>

</body>

</html>
